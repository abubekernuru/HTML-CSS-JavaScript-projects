<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator v-2</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <section class="display">
            <input type="text" class="input" id="input" disabled>
            <label for="input" id="hidden">calculato</label>
        </section>
        <section class="btns">
            <button class="btn cancel">C</button>
            <button class="btn operator">*</button>
            <button class="btn operator">+</button>
            <button class="btn operator">-</button>
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn operator">/</button>
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn operator equal">=</button>
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn decimal">.</button>
            <button class="btn zero">0</button>
            <button class="btn back">⌫</button>

        </section>
    </main>
</body>
</html>
